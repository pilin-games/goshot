
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none}
#gc{display:block;cursor:none}
#wrap{position:relative;width:100%;height:560px;background:#0d0d1a;border-radius:12px;overflow:hidden}
#overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:rgba(13,13,26,0.96)}
.ov-title{font-size:28px;font-weight:500;color:#afa9ec;letter-spacing:2px}
.ov-sub{font-size:13px;color:#888;text-align:center;line-height:1.7}
.ov-btn{padding:10px 32px;border-radius:8px;border:1.5px solid #7f77dd;background:transparent;color:#afa9ec;font-size:14px;cursor:pointer;transition:background 0.15s}
.ov-btn:hover{background:rgba(127,119,221,0.15)}
#hud{position:absolute;top:0;left:0;width:100%;pointer-events:none}
#skill-bar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:10px;pointer-events:all}
.sk{width:56px;height:56px;border-radius:10px;background:rgba(20,20,35,0.9);border:2px solid #444;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:border-color 0.15s}
.sk.ready{border-color:#7f77dd}
.sk-icon{font-size:20px}
.sk-key{font-size:9px;color:#aaa}
.sk-cd{font-size:10px;color:#fac775;min-height:12px}
#wave-info{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);color:#ccc;font-size:12px;padding:4px 14px;border-radius:20px;white-space:nowrap}
#upgrade-overlay{position:absolute;inset:0;background:rgba(13,13,26,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.up-title{font-size:20px;color:#fac775;font-weight:500}
.up-cards{display:flex;gap:12px}
.up-card{width:140px;padding:16px 12px;border-radius:10px;border:1.5px solid #444;background:rgba(30,30,50,0.9);cursor:pointer;text-align:center;transition:border-color 0.15s,transform 0.1s}
.up-card:hover{border-color:#7f77dd;transform:translateY(-3px)}
.up-card-icon{font-size:26px;margin-bottom:8px}
.up-card-name{font-size:13px;color:#afa9ec;font-weight:500;margin-bottom:4px}
.up-card-desc{font-size:11px;color:#888;line-height:1.5}
</style>

<div id="wrap">
<canvas id="gc" width="680" height="560"></canvas>
<div id="hud">
  <div id="wave-info"></div>
  <div id="skill-bar">
    <div class="sk ready" id="sk-e" onclick="castSkill('e')">
      <span class="sk-icon" style="color:#7f77dd">&#9889;</span>
      <span class="sk-key">[E] 電擊</span>
      <span class="sk-cd" id="cd-e"></span>
    </div>
    <div class="sk ready" id="sk-q" onclick="castSkill('q')">
      <span class="sk-icon" style="color:#d85a30">&#128640;</span>
      <span class="sk-key">[Q] 飛彈</span>
      <span class="sk-cd" id="cd-q"></span>
    </div>
  </div>
</div>
<div id="overlay">
  <div class="ov-title">&#9876; 異界征途</div>
  <div class="ov-sub">滑鼠移動控制主角<br>E 電擊波 &nbsp;|&nbsp; Q 追蹤飛彈<br>每5波擊敗BOSS，每波結束可選擇強化</div>
  <button class="ov-btn" onclick="startGame()">開始遊戲</button>
</div>
<div id="upgrade-overlay" style="display:none">
  <div class="up-title">選擇強化</div>
  <div class="up-cards" id="up-cards"></div>
</div>
</div>

<script>
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const W=680,H=560;
let gameState='title';
let mouse={x:W/2,y:H/2};
let frame=0,shakeTimer=0;
let waveNum=1,waveTimer=0,waveEnemiesLeft=0,waveSpawned=0;
let wavePhase='spawning';

const stats={spd:2.4,atkSpd:40,dmg:15,eMult:1,qMult:1};

const player={x:W/2,y:H/2,r:14,hp:150,maxHp:150,color:'#7f77dd',atkTimer:0};
const companions=[
  {x:W/2-50,y:H/2+40,r:11,color:'#5DCAA5',role:'orb',atkTimer:0,orbs:[]},
  {x:W/2+50,y:H/2+40,r:11,color:'#378ADD',role:'sniper',atkTimer:0},
  {x:W/2,y:H/2+65,r:12,color:'#EF9F27',role:'bomber',atkTimer:0},
];
const compOffsets=[{x:-55,y:40},{x:55,y:40},{x:0,y:68}];
let orbAngle=0;

let enemies=[],projectiles=[],particles=[],floatTexts=[],shockRings=[];
let skills={e:{cd:0,maxCd:200},q:{cd:0,maxCd:360}};

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouse.x=e.clientX-r.left;
  mouse.y=e.clientY-r.top;
});

document.addEventListener('keydown',e=>{
  if(gameState!=='playing') return;
  if(e.key==='e'||e.key==='E') castSkill('e');
  if(e.key==='q'||e.key==='Q') castSkill('q');
});

function startGame(){
  document.getElementById('overlay').style.display='none';
  gameState='playing';
  waveNum=1; startWave();
}

function startWave(){
  wavePhase='spawning';
  waveSpawned=0;
  waveTimer=0;
  const isBoss=waveNum%5===0;
  waveEnemiesLeft=isBoss?1:6+waveNum*2;
  updateWaveUI();
}

function updateWaveUI(){
  const isBoss=waveNum%5===0;
  document.getElementById('wave-info').textContent=
    (isBoss?'!! BOSS !! ':'')+'第 '+waveNum+' 波  敵人剩餘: '+waveEnemiesLeft;
}

function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);}

function addParticle(x,y,color,count=5,big=false){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,s=(big?2:1)+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color,r:big?3+Math.random()*4:1.5+Math.random()*2.5});
  }
}

function addFloat(x,y,text,color='#fff'){
  floatTexts.push({x,y:y-10,text,color,life:1,vy:-1.5});
}

function spawnEnemy(){
  const side=Math.floor(Math.random()*4);
  let ex,ey;
  if(side===0){ex=Math.random()*W;ey=-25;}
  else if(side===1){ex=W+25;ey=Math.random()*H;}
  else if(side===2){ex=Math.random()*W;ey=H+25;}
  else{ex=-25;ey=Math.random()*H;}
  const isBoss=waveNum%5===0;
  const isMini=!isBoss&&waveNum>3&&Math.random()<0.3;
  const hp=isBoss?800+waveNum*80:isMini?20:40+waveNum*8;
  enemies.push({
    x:ex,y:ey,
    r:isBoss?32:isMini?9:14,
    hp,maxHp:hp,
    spd:isBoss?0.6:isMini?1.5:0.85+Math.random()*0.4+waveNum*0.04,
    color:isBoss?'#a32d2d':isMini?'#f09595':'#e24b4a',
    isBoss,isMini,
    atkTimer:Math.random()*80,
    angle:0
  });
}

function castSkill(key){
  const sk=skills[key];
  if(sk.cd>0||gameState!=='playing') return;
  sk.cd=sk.maxCd;
  if(key==='e'){
    const range=130*stats.eMult;
    shockRings.push({x:player.x,y:player.y,r:0,maxR:range,life:1});
    enemies.forEach(e=>{
      if(dist(player,e)<range+e.r){
        const dmg=Math.round(45*stats.eMult);
        e.hp-=dmg;
        addParticle(e.x,e.y,'#7f77dd',8);
        addFloat(e.x,e.y-e.r,'-'+dmg,'#afa9ec');
        shakeTimer=10;
      }
    });
  } else {
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2;
      projectiles.push({
        x:player.x+Math.cos(a)*20,y:player.y+Math.sin(a)*20,
        vx:Math.cos(a)*2,vy:Math.sin(a)*2,
        r:7,dmg:Math.round(60*stats.qMult),color:'#d85a30',
        life:1,type:'missile',trail:[],
        turnRate:0.08,target:null,
        age:0
      });
    }
    shakeTimer=8;
  }
  updateSkillUI();
}

function updateSkillUI(){
  ['e','q'].forEach(k=>{
    const sk=skills[k];
    const el=document.getElementById('cd-'+k);
    const btn=document.getElementById('sk-'+k);
    if(sk.cd>0){
      el.textContent=Math.ceil(sk.cd/60)+'s';
      btn.classList.remove('ready');
    } else {
      el.textContent='';
      btn.classList.add('ready');
    }
  });
}

function autoAttack(attacker,dmg,range,atkSpd,color,type='bullet'){
  attacker.atkTimer--;
  if(attacker.atkTimer>0) return;
  let nearest=null,nd=Infinity;
  enemies.forEach(e=>{const d=dist(attacker,e);if(d<range&&d<nd){nd=d;nearest=e;}});
  if(!nearest) return;
  attacker.atkTimer=atkSpd;
  const dx=nearest.x-attacker.x,dy=nearest.y-attacker.y,dl=Math.sqrt(dx*dx+dy*dy);
  if(type==='bomb'){
    projectiles.push({x:attacker.x,y:attacker.y,vx:dx/dl*3,vy:dy/dl*3,r:10,dmg,color,life:1,type:'bomb',target:nearest,aoe:55});
  } else {
    projectiles.push({x:attacker.x,y:attacker.y,vx:dx/dl*6,vy:dy/dl*6,r:4,dmg,color,life:1,type:'bullet'});
  }
}

function lerpAngle(a,b,t){
  let d=b-a;
  while(d>Math.PI) d-=Math.PI*2;
  while(d<-Math.PI) d+=Math.PI*2;
  return a+d*t;
}

function tick(){
  if(gameState!=='playing') return;
  frame++;

  const dx=mouse.x-player.x,dy=mouse.y-player.y,dd=Math.sqrt(dx*dx+dy*dy);
  const deadzone=10;
  if(dd>deadzone){
    const spd=Math.min(stats.spd,dd*0.12);
    player.x+=dx/dd*spd;
    player.y+=dy/dd*spd;
    player.x=Math.max(player.r,Math.min(W-player.r,player.x));
    player.y=Math.max(player.r,Math.min(H-player.r,player.y));
  }

  companions.forEach((c,i)=>{
    const ox=compOffsets[i].x,oy=compOffsets[i].y;
    const tx=player.x+ox,ty=player.y+oy;
    const cd=dist(c,{x:tx,y:ty});
    const lag=0.08+i*0.015;
    c.x+=(tx-c.x)*lag;
    c.y+=(ty-c.y)*lag;
  });

  orbAngle+=0.04;
  const orb=companions[0];
  orb.orbs=[];
  for(let i=0;i<3;i++){
    const a=orbAngle+i*(Math.PI*2/3);
    orb.orbs.push({x:orb.x+Math.cos(a)*28,y:orb.y+Math.sin(a)*28});
  }
  orb.orbs.forEach(ob=>{
    enemies.forEach(e=>{
      if(dist(ob,e)<e.r+8){
        e.hp-=0.4;
        addParticle(ob.x,ob.y,'#5DCAA5',1);
      }
    });
  });

  autoAttack(player,Math.round(stats.dmg),200,stats.atkSpd,'#afa9ec');
  autoAttack(companions[1],8,320,18,'#378ADD');
  autoAttack(companions[2],Math.round(55+waveNum*3),100,110,'#EF9F27','bomb');

  projectiles.forEach(p=>{
    if(p.type==='missile'){
      p.age++;
      if(p.age>20){
        let nearest=null,nd=Infinity;
        enemies.forEach(e=>{const d=dist(p,e);if(d<nd){nd=d;nearest=e;}});
        if(nearest){
          const ta=Math.atan2(nearest.y-p.y,nearest.x-p.x);
          const ca=Math.atan2(p.vy,p.vx);
          const na=lerpAngle(ca,ta,p.turnRate);
          const spd=5.5;
          p.vx=Math.cos(na)*spd;
          p.vy=Math.sin(na)*spd;
        }
      }
      if(p.trail) p.trail.push({x:p.x,y:p.y});
      if(p.trail&&p.trail.length>8) p.trail.shift();
    }
    p.x+=p.vx; p.y+=p.vy;
    if(p.type==='bomb'){
      const tgt=p.target;
      if(tgt&&dist(p,tgt)<tgt.r+p.r&&p.life>0){
        p.life=0;
        addParticle(p.x,p.y,'#EF9F27',18,true);
        shakeTimer=Math.max(shakeTimer,12);
        enemies.forEach(e=>{
          if(dist(p,e)<p.aoe+e.r){
            e.hp-=p.dmg;
            addFloat(e.x,e.y-e.r,'-'+p.dmg,'#fac775');
          }
        });
        shockRings.push({x:p.x,y:p.y,r:0,maxR:p.aoe,life:1,color:'#EF9F27'});
        return;
      }
    } else {
      enemies.forEach(e=>{
        if(dist(p,e)<e.r+p.r&&p.life>0){
          e.hp-=p.dmg;
          p.life=0;
          addParticle(e.x,e.y,p.color,4);
          if(p.dmg>20) addFloat(e.x,e.y-e.r,'-'+p.dmg,p.color);
          shakeTimer=Math.max(shakeTimer,p.type==='missile'?15:3);
        }
      });
    }
    if(p.x<-50||p.x>W+50||p.y<-50||p.y>H+50) p.life=0;
  });

  enemies.forEach(e=>{
    const ed=dist(player,e);
    if(ed>e.r+player.r){
      e.x+=(player.x-e.x)/ed*e.spd;
      e.y+=(player.y-e.y)/ed*e.spd;
    } else {
      e.atkTimer--;
      if(e.atkTimer<=0){
        const dmg=e.isBoss?12:e.isMini?2:5;
        player.hp=Math.max(0,player.hp-dmg);
        addFloat(player.x,player.y-20,'-'+dmg,'#e24b4a');
        shakeTimer=Math.max(shakeTimer,6);
        e.atkTimer=e.isBoss?60:80;
      }
    }
    if(e.isBoss) e.angle+=0.03;
  });

  const dead=[];
  enemies=enemies.filter(e=>{
    if(e.hp<=0){
      addParticle(e.x,e.y,e.color,e.isBoss?25:8,e.isBoss);
      if(e.isBoss) addFloat(e.x,e.y-40,'BOSS 擊破!','#fac775');
      waveEnemiesLeft--;
      updateWaveUI();
      dead.push(e);
      return false;
    }
    return true;
  });

  projectiles=projectiles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.9;p.vy*=0.9;p.life-=0.035;});
  particles=particles.filter(p=>p.life>0);
  floatTexts.forEach(f=>{f.y+=f.vy;f.life-=0.018;});
  floatTexts=floatTexts.filter(f=>f.life>0);
  shockRings.forEach(r=>{r.r+=6;r.life=1-r.r/r.maxR;});
  shockRings=shockRings.filter(r=>r.life>0);
  if(shakeTimer>0) shakeTimer--;
  ['e','q'].forEach(k=>{if(skills[k].cd>0){skills[k].cd--;updateSkillUI();}});

  if(wavePhase==='spawning'){
    waveTimer++;
    const isBoss=waveNum%5===0;
    const total=isBoss?1:6+waveNum*2;
    const interval=isBoss?10:Math.max(30,80-waveNum*4);
    if(waveSpawned<total&&waveTimer%interval===0){
      spawnEnemy(); waveSpawned++;
    }
    if(waveSpawned>=total) wavePhase='clearing';
  }

  if(wavePhase==='clearing'&&enemies.length===0&&waveEnemiesLeft<=0){
    wavePhase='done';
    setTimeout(()=>showUpgrade(),400);
  }

  if(player.hp<=0){
    gameState='dead';
    setTimeout(()=>showGameOver(),500);
  }
}

function showUpgrade(){
  gameState='upgrade';
  const pool=[
    {icon:'&#9889;',name:'電擊強化',desc:'電擊範圍與傷害提升20%',fn:()=>{stats.eMult*=1.2;}},
    {icon:'&#128640;',name:'飛彈強化',desc:'飛彈傷害提升25%',fn:()=>{stats.qMult*=1.25;}},
    {icon:'&#10024;',name:'攻速提升',desc:'主角攻速提升15%',fn:()=>{stats.atkSpd=Math.max(15,Math.round(stats.atkSpd*0.85));}},
    {icon:'&#128154;',name:'生命回復',desc:'立即回復40HP，上限+20',fn:()=>{player.maxHp+=20;player.hp=Math.min(player.maxHp,player.hp+40);}},
    {icon:'&#128293;',name:'暴擊強化',desc:'基礎傷害提升20%',fn:()=>{stats.dmg=Math.round(stats.dmg*1.2);}},
    {icon:'&#128970;',name:'移動強化',desc:'移動速度提升15%',fn:()=>{stats.spd*=1.15;}},
  ];
  const chosen=[...pool].sort(()=>Math.random()-0.5).slice(0,3);
  const container=document.getElementById('up-cards');
  container.innerHTML='';
  chosen.forEach(opt=>{
    const card=document.createElement('div');
    card.className='up-card';
    card.innerHTML=`<div class="up-card-icon">${opt.icon}</div><div class="up-card-name">${opt.name}</div><div class="up-card-desc">${opt.desc}</div>`;
    card.onclick=()=>{
      opt.fn();
      document.getElementById('upgrade-overlay').style.display='none';
      waveNum++;
      gameState='playing';
      startWave();
    };
    container.appendChild(card);
  });
  document.getElementById('upgrade-overlay').style.display='flex';
}

function showGameOver(){
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.innerHTML=`
    <div class="ov-title" style="color:#e24b4a">&#128128; 戰敗</div>
    <div class="ov-sub">到達第 ${waveNum} 波<br>再接再厲！</div>
    <button class="ov-btn" onclick="location.reload()">重新開始</button>
  `;
}

function drawHpBar(e,x,y,w,h){
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(x,y,w,h);
  const r=Math.max(0,e.hp/e.maxHp);
  ctx.fillStyle=r>0.5?'#1d9e75':r>0.25?'#ba7517':'#e24b4a';
  ctx.fillRect(x,y,w*r,h);
}

function drawCircle(e,glow){
  ctx.save();
  if(glow){ctx.shadowColor=e.color;ctx.shadowBlur=16;}
  ctx.beginPath();
  ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
  ctx.fillStyle=e.color;
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.25)';
  ctx.lineWidth=1.5;
  ctx.stroke();
  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const sx=shakeTimer>0?(Math.random()-0.5)*5:0;
  const sy=shakeTimer>0?(Math.random()-0.5)*5:0;
  ctx.save();
  ctx.translate(sx,sy);

  ctx.fillStyle='#0d0d1a';
  ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.03)';
  ctx.lineWidth=1;
  for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  shockRings.forEach(r=>{
    ctx.save();
    ctx.globalAlpha=r.life*0.5;
    ctx.beginPath();
    ctx.arc(r.x,r.y,r.r,0,Math.PI*2);
    ctx.strokeStyle=r.color||'#7f77dd';
    ctx.lineWidth=3;
    ctx.stroke();
    ctx.restore();
  });

  particles.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=p.life*0.85;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();
    ctx.restore();
  });

  projectiles.forEach(p=>{
    if(p.trail&&p.trail.length>1){
      ctx.save();
      for(let i=1;i<p.trail.length;i++){
        ctx.globalAlpha=(i/p.trail.length)*0.5;
        ctx.beginPath();
        ctx.arc(p.trail[i].x,p.trail[i].y,p.r*(i/p.trail.length)*0.6,0,Math.PI*2);
        ctx.fillStyle=p.color;
        ctx.fill();
      }
      ctx.restore();
    }
    ctx.save();
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.shadowColor=p.color;
    ctx.shadowBlur=12;
    ctx.fill();
    ctx.restore();
  });

  enemies.forEach(e=>{
    if(e.isBoss){
      ctx.save();
      ctx.translate(e.x,e.y);
      ctx.rotate(e.angle);
      for(let i=0;i<6;i++){
        const a=(i/6)*Math.PI*2;
        ctx.beginPath();
        ctx.arc(Math.cos(a)*20,Math.sin(a)*20,8,0,Math.PI*2);
        ctx.fillStyle='#7b1f1f';
        ctx.fill();
      }
      ctx.restore();
    }
    drawCircle(e);
    drawHpBar(e,e.x-e.r,e.y-e.r-10,e.r*2,5);
    ctx.fillStyle='#fff';
    ctx.font=`bold ${e.isBoss?12:9}px sans-serif`;
    ctx.textAlign='center';
    ctx.fillText(e.isBoss?'BOSS':e.isMini?'·':'敵',e.x,e.y+4);
  });

  const orb=companions[0];
  orb.orbs&&orb.orbs.forEach(ob=>{
    ctx.save();
    ctx.beginPath();
    ctx.arc(ob.x,ob.y,7,0,Math.PI*2);
    ctx.fillStyle='#5DCAA5';
    ctx.shadowColor='#5DCAA5';
    ctx.shadowBlur=14;
    ctx.fill();
    ctx.restore();
  });

  companions.forEach((c,i)=>{
    drawCircle(c,true);
    const labels=['靈','弓','爆'];
    ctx.fillStyle='#fff';
    ctx.font='bold 10px sans-serif';
    ctx.textAlign='center';
    ctx.fillText(labels[i],c.x,c.y+4);
  });

  drawCircle(player,true);
  ctx.fillStyle='#fff';
  ctx.font='bold 11px sans-serif';
  ctx.textAlign='center';
  ctx.fillText('主',player.x,player.y+4);
  drawHpBar(player,player.x-player.r,player.y-player.r-10,player.r*2,5);

  ctx.fillStyle='rgba(0,0,0,0.45)';
  ctx.fillRect(8,8,130,14);
  const hr=player.hp/player.maxHp;
  ctx.fillStyle=hr>0.5?'#1d9e75':hr>0.25?'#ba7517':'#e24b4a';
  ctx.fillRect(8,8,130*hr,14);
  ctx.fillStyle='#fff';
  ctx.font='10px sans-serif';
  ctx.textAlign='left';
  ctx.fillText('HP '+Math.ceil(player.hp)+' / '+player.maxHp,12,20);

  floatTexts.forEach(f=>{
    ctx.save();
    ctx.globalAlpha=f.life;
    ctx.font='bold 13px sans-serif';
    ctx.fillStyle=f.color;
    ctx.textAlign='center';
    ctx.fillText(f.text,f.x,f.y);
    ctx.restore();
  });

  ctx.save();
  ctx.beginPath();
  ctx.arc(mouse.x,mouse.y,5,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.8)';
  ctx.lineWidth=2;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(mouse.x,mouse.y,2,0,Math.PI*2);
  ctx.fillStyle='#fff';
  ctx.fill();
  ctx.restore();

  ctx.restore();
}

function loop(){requestAnimationFrame(loop);if(gameState==='playing'){tick();}draw();}
loop();
</script>
